name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'microsoft'

    - name: Build with Maven
      run: mvn clean compile hpi:hpi -DskipTests -Dlicense.skip=true

    - name: Upload HPI artifact
      uses: actions/upload-artifact@v4
      with:
        name: simple-api-trigger.hpi
        path: target/simple-api-trigger.hpi

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'microsoft'

    - name: Build with Maven
      run: mvn clean compile hpi:hpi -DskipTests -Dlicense.skip=true

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          target/simple-api-trigger.hpi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
