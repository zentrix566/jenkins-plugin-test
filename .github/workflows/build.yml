name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'microsoft'

    - name: Build with Maven
      run: mvn clean compile hpi:hpi -DskipTests -Dlicense.skip=true

    - name: Upload HPI artifact
      uses: actions/upload-artifact@v4
      with:
        name: simple-api-trigger.hpi
        path: target/simple-api-trigger.hpi
